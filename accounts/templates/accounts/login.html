<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — Synthesisform</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #1a1d23;
            color: #e1e4e8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            background: #21262d;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 32px;
            width: 360px;
        }
        h1 {
            font-size: 1.5rem;
            margin-bottom: 24px;
            text-align: center;
        }
        label {
            display: block;
            font-size: 0.85rem;
            margin-bottom: 4px;
            color: #8b949e;
        }
        input {
            width: 100%;
            padding: 8px 12px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: #e1e4e8;
            font-size: 0.95rem;
            margin-bottom: 16px;
        }
        input:focus {
            outline: 2px solid #58a6ff;
            outline-offset: 2px;
            border-color: #58a6ff;
        }
        input:focus:not(:focus-visible) {
            outline: none;
        }
        input:focus-visible {
            outline: 2px solid #58a6ff;
            outline-offset: 2px;
        }
        button {
            width: 100%;
            padding: 10px;
            background: #238636;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
            margin-bottom: 12px;
        }
        button:hover { background: #2ea043; }
        .links {
            text-align: center;
            font-size: 0.85rem;
        }
        .links a {
            color: #58a6ff;
            text-decoration: none;
        }
        .links a:hover { text-decoration: underline; }
        .error {
            background: #490202;
            border: 1px solid #da3633;
            border-radius: 6px;
            padding: 10px;
            margin-bottom: 16px;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Synthesisform</h1>
        {% if form.errors %}
        <div class="error">
            Неверное имя пользователя или пароль.
        </div>
        {% endif %}
        <form method="post">
            {% csrf_token %}
            <label for="id_username">Логин</label>
            <input type="text" name="username" id="id_username" required autofocus autocomplete="username">

            <label for="id_password">Пароль</label>
            <input type="password" name="password" id="id_password" required autocomplete="current-password">

            <button type="submit">Войти</button>
        </form>
        <div class="links">
            <a href="{% url 'register' %}">Регистрация</a>
        </div>
    </div>
</body>
</html>
